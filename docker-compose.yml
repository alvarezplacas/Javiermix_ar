services:
  # Base de Datos Principal (PostgreSQL 16)
  db:
    image: postgres:16-alpine
    container_name: javiermix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "JavierMix2026!"
      POSTGRES_DB: javiermix_db
    volumes:
      - /opt/javiermix/personal_files/postgres_data:/var/lib/postgresql/data
    networks:
      - javiermix_network

  # Sitio Web Principal (Astro 6)
  web_javiermix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javiermix_web
    restart: always
    env_file:
      - .env
    networks:
      - javiermix_network

  # Caching Layer (Redis 7)
  redis:
    image: redis:7-alpine
    container_name: javiermix_redis
    restart: always
    volumes:
      - /opt/javiermix/personal_files/redis_data:/data
    networks:
      - javiermix_network

  # Directus (Gestión de Contenido)
  directus:
    image: directus/directus:latest
    container_name: javiermix_directus
    restart: always
    environment:
      KEY: "9876543210abcdef9876543210abcdef"
      SECRET: "abcdef0123456789abcdef0123456789"
      DB_CLIENT: "pg"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_DATABASE: "javiermix_db"
      DB_USER: "postgres"
      DB_PASSWORD: "JavierMix2026!"
      PUBLIC_URL: "https://admin.javiermix.ar"
      ADMIN_EMAIL: "admin@javiermix.ar"
      ADMIN_PASSWORD: "Tecno/121212"
      EXTENSIONS_CHECK_PROXY_HEADERS: "true"
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://javiermix_redis:6379"
      CACHE_REDIS: "redis://javiermix_redis:6379"
      LOCK_STORE: "redis"
      LOCK_REDIS: "redis://javiermix_redis:6379"
      STORAGE_LOCATIONS: "s3,local"
      # Configuración de S3 (MinIO) - Fallback a local si se prefiere
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: "javiermix_key"
      STORAGE_S3_SECRET: "javiermix_secret"
      STORAGE_S3_BUCKET: "assets"
      STORAGE_S3_REGION: "us-east-1"
      STORAGE_S3_ENDPOINT: "https://s3.javiermix.ar"
      STORAGE_S3_S3_FORCE_PATH_STYLE: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://javiermix.ar, https://admin.javiermix.ar"
    volumes:
      - /opt/javiermix/personal_files/directus/uploads:/directus/uploads
      - /opt/javiermix/personal_files/directus/extensions:/directus/extensions
    depends_on:
      - db
    networks:
      - javiermix_network

  # Umami Analytics (Estadísticas Golden Master 2.0)
  stats:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: javiermix-stats
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:JavierMix2026!@db:5432/javiermix_db
      APP_SECRET: "3L3X1T0LL3G0!#@a"
    depends_on:
      - db
    networks:
      - javiermix_network

networks:
  javiermix_network:
    external: true

