services:
  # Base de Datos Principal (PostgreSQL 15)
  db:
    image: postgres:16-alpine
    container_name: javiermix_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "JavierMix2026!"
      POSTGRES_DB: javiermix_db
    volumes:
      - /opt/javiermix/personal_files/postgres_data:/var/lib/postgresql/data
    networks:
      - javiermix_internal

  # Sitio Web Principal (Astro 6)
  web_javiermix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javiermix_web
    restart: always
    env_file:
      - .env
    networks:
      - javiermix_internal
      - javiermix_network

  # Caching Layer (Redis 7) - 'cache' para Directus
  cache:
    image: redis:7-alpine
    container_name: javiermix_redis
    restart: always
    volumes:
      - /opt/javiermix/personal_files/redis_data:/data
    networks:
      - javiermix_internal

  # Directus (Gestión de Contenido)
  directus:
    image: directus/directus:11.17.2
    container_name: javiermix-directus
    restart: always
    environment:
      KEY: "9876543210abcdef9876543210abcdef"
      SECRET: "abcdef0123456789abcdef0123456789"
      DB_CLIENT: "pg"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      PUBLIC_URL: "https://admin.javiermix.ar"
      ADMIN_EMAIL: "admin@javiermix.ar"
      ADMIN_PASSWORD: "Tecno/121212"
      EXTENSIONS_CHECK_PROXY_HEADERS: "true"
      
      # ⚡ Optimización de Medios (AVIF & Video)
      FILES_MIME_TYPE_ALLOW_LIST: "image/avif,image/webp,video/mp4,video/quicktime,image/jpeg,image/png,image/svg+xml"
      FILES_SIZE_LIMIT: "100mb"
      IMAGE_TRANSFORMER: "sharp"
      # AVIF/WebP Quality Tuning
      WEBP_QUALITY: "80"
      AVIF_QUALITY: "75"

      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"
      CACHE_REDIS: "redis://cache:6379"
      LOCK_STORE: "redis"
      LOCK_REDIS: "redis://cache:6379"
      STORAGE_LOCATIONS: "s3"
      # Configuración de S3 (MinIO Activo)
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: "${STORAGE_S3_KEY}"
      STORAGE_S3_SECRET: "${STORAGE_S3_SECRET}"
      STORAGE_S3_BUCKET: "${STORAGE_S3_BUCKET}"
      STORAGE_S3_REGION: "${STORAGE_S3_REGION}"
      STORAGE_S3_ENDPOINT: "${STORAGE_S3_ENDPOINT}"
      STORAGE_S3_S3_FORCE_PATH_STYLE: "${STORAGE_S3_S3_FORCE_PATH_STYLE}"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://javiermix.ar, https://admin.javiermix.ar"
    volumes:
      - /opt/javiermix/personal_files/directus/uploads:/directus/uploads
      - /opt/javiermix/personal_files/directus/extensions:/directus/extensions
    depends_on:
      - db
    networks:
      - javiermix_internal
      - javiermix_network

  # Umami Analytics (Estadísticas Golden Master 2.0)
  stats:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: javiermix_stats
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:JavierMix2026!@db:5432/javiermix_db
      APP_SECRET: "3L3X1T0LL3G0!#@a"
    depends_on:
      - db
    networks:
      - javiermix_internal

networks:
  javiermix_network:
    external: true
  javiermix_internal:
    driver: bridge
    internal: true
