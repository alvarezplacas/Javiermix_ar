services:
  db:
    image: mariadb:latest
    container_name: javiermix_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: javiermix_obras
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  directus:
    image: directus/directus:latest
    container_name: javiermix_directus_local
    restart: always
    ports:
      - "8055:8055"
    environment:
      KEY: "9876543210abcdef9876543210abcdef"
      SECRET: "abcdef0123456789abcdef0123456789"
      DB_CLIENT: "mysql"
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_DATABASE: "javiermix_obras"
      DB_USER: "root"
      DB_PASSWORD: "root"
      ADMIN_EMAIL: "admin@javiermix.ar"
      ADMIN_PASSWORD: "JavierMix2026!"
    depends_on:
      - db

volumes:
  db_data:
